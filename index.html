<!DOCTYPE html>
<html>
<head>
  <title>Experiment with Grids</title>

  <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
  </script>
</head>

<body>
	<div class="container">
		<h1>Grid Experiments!</h1>
		<p>Resize the browser window to see the effect.</p>
		<div class="row">
			<div class="col-md-8 col-xs-4" style="background-color:tomato; border: 1px solid black;">col-md-8 </div>
			<div class="col-md-4 col-xs-8" style="background-color:lavender;">col-md-4 </div>
		</div>
		<div class="row">
			<div class="col-lg-6 col-md-4" style="background-color:lavenderblush;">col-lg-6 </div>
			<div class="col-lg-6 col-md-8" style="background-color:lightgrey;">col-lg-6 </div>
		</div>
		<div class="row" style="background-color:lightcyan;">
			<div class="col-xs-6">col-xs-6</div>
			<div class="col-xs-6">col-xs-6</div>
		</div>
		<div class="row">
			<div class="col-md-4" style="background-color:wheat;">col-md-4</div>
			<div class="col-md-4" style="background-color:thistle;">col-md-4</div>
			<div class="col-md-4" style="background-color:peachpuff;">col-md-4</div>
		</div>
	</div>
</body>
</html>
